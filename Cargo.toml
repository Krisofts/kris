[workspace]
resolver = "2"

members = [
    "crates/kris-cli",
    "crates/kris-agent",
    "crates/kris-tools",
    "crates/kris-core",
]

[workspace.package]
edition = "2024"
version = "0.1.0"
license = "MIT"
authors = ["Elvano Inferno"]

[workspace.dependencies]

# Error Handling
anyhow = "1"
thiserror = "2"

# Async Runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.9"

# CLI
clap = { version = "4", features = ["derive"] }

# HTTP client (talks to a local llama.cpp `llama-server` instance)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Filesystem
walkdir = "2"
ignore = "0.4"

# Text Processing
regex = "1"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }